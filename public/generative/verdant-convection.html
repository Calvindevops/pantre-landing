<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verdant Convection — Generative Art Viewer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --anthropic-dark: #141413;
            --anthropic-light: #faf9f5;
            --anthropic-mid-gray: #b0aea5;
            --anthropic-light-gray: #e8e6dc;
            --anthropic-orange: #d97757;
            --anthropic-blue: #6a9bcc;
            --anthropic-green: #788c5d;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--anthropic-light) 0%, #f5f3ee 100%);
            min-height: 100vh;
            color: var(--anthropic-dark);
        }
        .container { display: flex; min-height: 100vh; padding: 20px; gap: 20px; }
        .sidebar {
            width: 320px; flex-shrink: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 24px; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(20, 20, 19, 0.1);
            overflow-y: auto;
        }
        .sidebar h1 { font-family: 'Lora', serif; font-size: 24px; font-weight: 500; margin-bottom: 8px; }
        .sidebar .subtitle { color: var(--anthropic-mid-gray); font-size: 14px; margin-bottom: 32px; line-height: 1.5; }
        .control-section { margin-bottom: 32px; }
        .control-section h3 {
            font-size: 16px; font-weight: 600; margin-bottom: 16px;
            display: flex; align-items: center; gap: 8px;
        }
        .control-section h3::before { content: '•'; color: var(--anthropic-orange); }
        .seed-input {
            width: 100%; background: var(--anthropic-light);
            padding: 12px; border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 14px; margin-bottom: 12px;
            border: 1px solid var(--anthropic-light-gray);
            text-align: center;
        }
        .seed-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
        .control-group { margin-bottom: 20px; }
        .control-group label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 8px; }
        .slider-container { display: flex; align-items: center; gap: 12px; }
        .slider-container input[type="range"] {
            flex: 1; height: 4px; background: var(--anthropic-light-gray);
            border-radius: 2px; -webkit-appearance: none;
        }
        .slider-container input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 16px; height: 16px;
            background: var(--anthropic-orange); border-radius: 50%; cursor: pointer;
        }
        .value-display {
            font-family: 'Courier New', monospace; font-size: 12px;
            color: var(--anthropic-mid-gray); min-width: 60px; text-align: right;
        }
        .color-group { margin-bottom: 16px; }
        .color-group label { display: block; font-size: 12px; color: var(--anthropic-mid-gray); margin-bottom: 4px; }
        .color-picker-container { display: flex; align-items: center; gap: 8px; }
        .color-picker-container input[type="color"] {
            width: 32px; height: 32px; border: none; border-radius: 6px; cursor: pointer;
        }
        .button {
            background: var(--anthropic-orange); color: white; border: none;
            padding: 10px 16px; border-radius: 6px; font-size: 14px;
            font-weight: 500; cursor: pointer; width: 100%;
        }
        .button:hover { background: #c86641; }
        .button.secondary { background: var(--anthropic-blue); }
        .button.tertiary { background: var(--anthropic-green); }
        .button-row { display: flex; gap: 8px; }
        .button-row .button { flex: 1; }
        .canvas-area { flex: 1; display: flex; align-items: center; justify-content: center; }
        #canvas-container {
            width: 100%; max-width: 1000px; border-radius: 12px;
            overflow: hidden; box-shadow: 0 20px 40px rgba(20, 20, 19, 0.1); background: #0a0a0a;
        }
        #canvas-container canvas { display: block; width: 100% !important; height: auto !important; }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h1>Verdant Convection</h1>
            <div class="subtitle">Thermal currents made visible — particles rising through darkness, tracing the paths that warmth takes through a medium. The physics of cooking, expressed algorithmically.</div>

            <!-- FIXED: Seed Section -->
            <div class="control-section">
                <h3>Seed</h3>
                <input type="number" id="seed-input" class="seed-input" value="42" onchange="updateSeed()">
                <div class="seed-controls">
                    <button class="button secondary" onclick="previousSeed()">&#8592; Prev</button>
                    <button class="button secondary" onclick="nextSeed()">Next &#8594;</button>
                </div>
                <button class="button tertiary" onclick="randomSeedAndUpdate()">&#8635; Random</button>
            </div>

            <!-- Parameters Section -->
            <div class="control-section">
                <h3>Parameters</h3>
                <div class="control-group">
                    <label>Particle Count</label>
                    <div class="slider-container">
                        <input type="range" id="particleCount" min="200" max="2000" value="800" step="50" oninput="updateParam('particleCount', this.value)">
                        <span class="value-display" id="particleCount-value">800</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>Thermal Force</label>
                    <div class="slider-container">
                        <input type="range" id="thermalForce" min="0.1" max="3.0" value="1.2" step="0.1" oninput="updateParam('thermalForce', this.value)">
                        <span class="value-display" id="thermalForce-value">1.2</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>Noise Scale</label>
                    <div class="slider-container">
                        <input type="range" id="noiseScale" min="0.001" max="0.01" value="0.004" step="0.001" oninput="updateParam('noiseScale', this.value)">
                        <span class="value-display" id="noiseScale-value">0.004</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>Turbulence</label>
                    <div class="slider-container">
                        <input type="range" id="turbulence" min="0.5" max="4.0" value="1.8" step="0.1" oninput="updateParam('turbulence', this.value)">
                        <span class="value-display" id="turbulence-value">1.8</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>Trail Opacity</label>
                    <div class="slider-container">
                        <input type="range" id="trailOpacity" min="1" max="30" value="8" step="1" oninput="updateParam('trailOpacity', this.value)">
                        <span class="value-display" id="trailOpacity-value">8</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>Noise Evolution</label>
                    <div class="slider-container">
                        <input type="range" id="noiseEvolution" min="0.0005" max="0.005" value="0.002" step="0.0005" oninput="updateParam('noiseEvolution', this.value)">
                        <span class="value-display" id="noiseEvolution-value">0.002</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>Max Lifespan</label>
                    <div class="slider-container">
                        <input type="range" id="maxLifespan" min="60" max="400" value="200" step="10" oninput="updateParam('maxLifespan', this.value)">
                        <span class="value-display" id="maxLifespan-value">200</span>
                    </div>
                </div>
            </div>

            <!-- Colors Section -->
            <div class="control-section">
                <h3>Colors</h3>
                <div class="color-group">
                    <label>Core Glow</label>
                    <div class="color-picker-container">
                        <input type="color" id="coreColor" value="#1a9e5f" onchange="updateColor('coreColor', this.value)">
                        <span class="value-display">#1a9e5f</span>
                    </div>
                </div>
                <div class="color-group">
                    <label>Highlight</label>
                    <div class="color-picker-container">
                        <input type="color" id="highlightColor" value="#b8ecd4" onchange="updateColor('highlightColor', this.value)">
                        <span class="value-display">#b8ecd4</span>
                    </div>
                </div>
            </div>

            <!-- FIXED: Actions Section -->
            <div class="control-section">
                <h3>Actions</h3>
                <div class="button-row">
                    <button class="button" onclick="resetParameters()">Reset</button>
                </div>
            </div>
        </div>
        <div class="canvas-area">
            <div id="canvas-container"></div>
        </div>
    </div>
    <script>
        let params = {
            seed: 42,
            particleCount: 800,
            thermalForce: 1.2,
            noiseScale: 0.004,
            turbulence: 1.8,
            trailOpacity: 8,
            noiseEvolution: 0.002,
            maxLifespan: 200,
            coreColor: [26, 158, 95],
            highlightColor: [184, 236, 212]
        };

        let defaultParams = JSON.parse(JSON.stringify(params));
        let particles = [];
        let zOff = 0;

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = random(width);
                this.y = random(height * 0.7, height);
                this.vx = 0;
                this.vy = 0;
                this.prevX = this.x;
                this.prevY = this.y;
                this.age = 0;
                this.lifespan = random(params.maxLifespan * 0.4, params.maxLifespan);
                this.energy = random(0.3, 1.0);
                this.size = random(0.5, 2.0);
            }

            update() {
                this.prevX = this.x;
                this.prevY = this.y;

                // Base convection noise field
                let baseAngle = noise(
                    this.x * params.noiseScale,
                    this.y * params.noiseScale,
                    zOff
                ) * TWO_PI * params.turbulence;

                // Turbulence layer
                let turbAngle = noise(
                    this.x * params.noiseScale * 3,
                    this.y * params.noiseScale * 3,
                    zOff + 100
                ) * TWO_PI * 0.5;

                // Micro texture
                let microAngle = noise(
                    this.x * params.noiseScale * 8,
                    this.y * params.noiseScale * 8,
                    zOff + 200
                ) * TWO_PI * 0.15;

                // Combined flow with upward thermal bias
                let flowX = cos(baseAngle) * 0.6 + cos(turbAngle) * 0.3 + cos(microAngle) * 0.1;
                let flowY = sin(baseAngle) * 0.6 + sin(turbAngle) * 0.3 + sin(microAngle) * 0.1;

                // Thermal upward force — stronger near bottom
                let thermalBias = map(this.y, 0, height, 0.2, params.thermalForce);

                this.vx += flowX * 0.5;
                this.vy += flowY * 0.5 - thermalBias * 0.3;

                // Drag
                this.vx *= 0.95;
                this.vy *= 0.95;

                this.x += this.vx;
                this.y += this.vy;

                this.age++;
                this.energy = max(0, this.energy - 0.001);

                // Die if out of bounds or too old
                if (this.x < -20 || this.x > width + 20 || this.y < -20 || this.y > height + 20 || this.age > this.lifespan) {
                    this.reset();
                }
            }

            draw() {
                let lifeRatio = this.age / this.lifespan;
                // Fade in, sustain, fade out
                let alpha;
                if (lifeRatio < 0.1) {
                    alpha = map(lifeRatio, 0, 0.1, 0, 1);
                } else if (lifeRatio > 0.7) {
                    alpha = map(lifeRatio, 0.7, 1.0, 1, 0);
                } else {
                    alpha = 1;
                }

                let speed = dist(this.x, this.y, this.prevX, this.prevY);
                let brightness = constrain(map(speed, 0, 4, 0.3, 1.0), 0, 1);

                // Color: interpolate between core and highlight based on energy and speed
                let r = lerp(params.coreColor[0], params.highlightColor[0], brightness * this.energy);
                let g = lerp(params.coreColor[1], params.highlightColor[1], brightness * this.energy);
                let b = lerp(params.coreColor[2], params.highlightColor[2], brightness * this.energy);

                let finalAlpha = alpha * this.energy * brightness * 180;

                stroke(r, g, b, finalAlpha);
                strokeWeight(this.size * (0.5 + brightness * 0.5));
                line(this.prevX, this.prevY, this.x, this.y);
            }
        }

        function setup() {
            let canvas = createCanvas(1200, 1200);
            canvas.parent('canvas-container');
            initializeSystem();
        }

        function initializeSystem() {
            randomSeed(params.seed);
            noiseSeed(params.seed);
            zOff = 0;
            background(10, 10, 10);
            particles = [];
            for (let i = 0; i < params.particleCount; i++) {
                particles.push(new Particle());
            }
        }

        function draw() {
            // Semi-transparent overlay for trail effect
            noStroke();
            fill(10, 10, 10, params.trailOpacity);
            rect(0, 0, width, height);

            // Update and draw particles
            for (let p of particles) {
                p.update();
                p.draw();
            }

            // Evolve noise field
            zOff += params.noiseEvolution;

            // Adjust particle count dynamically
            while (particles.length < params.particleCount) {
                particles.push(new Particle());
            }
            while (particles.length > params.particleCount) {
                particles.pop();
            }
        }

        // Seed controls
        function updateSeed() {
            params.seed = parseInt(document.getElementById('seed-input').value);
            initializeSystem();
        }
        function previousSeed() {
            params.seed--;
            document.getElementById('seed-input').value = params.seed;
            initializeSystem();
        }
        function nextSeed() {
            params.seed++;
            document.getElementById('seed-input').value = params.seed;
            initializeSystem();
        }
        function randomSeedAndUpdate() {
            params.seed = Math.floor(Math.random() * 999999);
            document.getElementById('seed-input').value = params.seed;
            initializeSystem();
        }

        // Parameter controls
        function updateParam(name, value) {
            params[name] = parseFloat(value);
            document.getElementById(name + '-value').textContent = value;
            if (name === 'particleCount') {
                // Handled in draw loop
            } else if (name === 'maxLifespan') {
                // Applied on next particle reset
            }
        }

        function updateColor(id, hexValue) {
            let r = parseInt(hexValue.slice(1, 3), 16);
            let g = parseInt(hexValue.slice(3, 5), 16);
            let b = parseInt(hexValue.slice(5, 7), 16);
            if (id === 'coreColor') params.coreColor = [r, g, b];
            if (id === 'highlightColor') params.highlightColor = [r, g, b];
        }

        function resetParameters() {
            params = JSON.parse(JSON.stringify(defaultParams));
            document.getElementById('seed-input').value = params.seed;
            document.getElementById('particleCount').value = params.particleCount;
            document.getElementById('particleCount-value').textContent = params.particleCount;
            document.getElementById('thermalForce').value = params.thermalForce;
            document.getElementById('thermalForce-value').textContent = params.thermalForce;
            document.getElementById('noiseScale').value = params.noiseScale;
            document.getElementById('noiseScale-value').textContent = params.noiseScale;
            document.getElementById('turbulence').value = params.turbulence;
            document.getElementById('turbulence-value').textContent = params.turbulence;
            document.getElementById('trailOpacity').value = params.trailOpacity;
            document.getElementById('trailOpacity-value').textContent = params.trailOpacity;
            document.getElementById('noiseEvolution').value = params.noiseEvolution;
            document.getElementById('noiseEvolution-value').textContent = params.noiseEvolution;
            document.getElementById('maxLifespan').value = params.maxLifespan;
            document.getElementById('maxLifespan-value').textContent = params.maxLifespan;
            document.getElementById('coreColor').value = '#1a9e5f';
            document.getElementById('highlightColor').value = '#b8ecd4';
            initializeSystem();
        }
    </script>
</body>
</html>
